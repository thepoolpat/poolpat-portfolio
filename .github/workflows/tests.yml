name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r pipeline/requirements.txt
          pip install pytest

      - name: Run pytest
        working-directory: pipeline
        run: python -m pytest tests/ -v

  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run vitest
        run: npm test
        env:
          CAMPAIGN_HASH_SALT: test-salt-do-not-use-in-prod

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type-check
        run: npx astro check
      - name: Build site
        run: npm run build
        env:
          DEPLOY_TARGET: public
          CAMPAIGN_HASH_SALT: dummy-build-salt-not-for-prod
