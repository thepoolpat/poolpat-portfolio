name: Fetch Play Counts

on:
  schedule:
    - cron: "15 7 * * *"
  workflow_dispatch: {}

jobs:
  sync-play-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout portfolio
        uses: actions/checkout@v4

      - name: Fetch latest data from poolpat-plays
        run: |
          mkdir -p data
          curl -fsSL https://raw.githubusercontent.com/thepoolpat/poolpat-plays/main/data/plays.json -o data/plays.json
          curl -fsSL https://raw.githubusercontent.com/thepoolpat/poolpat-plays/main/data/history.csv -o data/history.csv
          curl -fsSL https://raw.githubusercontent.com/thepoolpat/poolpat-plays/main/data/rss_tracks.json -o data/rss_tracks.json

      - name: Commit synced data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: sync play stats from poolpat-plays"
          git push
