name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}
  workflow_run:
    workflows: ["Fetch Data (weekly)"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Always build main's current tip. For workflow_run deploys this
          # guarantees we pick up the data commit the fetch just pushed
          # (ref-less checkout can resolve to the pre-commit head_sha).
          ref: main

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          DEPLOY_TARGET: public
          CAMPAIGN_HASH_SALT: ${{ secrets.CAMPAIGN_HASH_SALT }}

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
